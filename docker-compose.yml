version: "3.8"

services:
  heloxai:
    build: .
    container_name: heloxai_backend
    ports:
      - "8000:8000" # Maps host port 8000 to container port 8000
    restart: always
    env_file:
      - .env # Loads variables from the .env file
    environment:
      - CUDA_VISIBLE_DEVICES=0 # Ensure it sees the GPU if using RunPod/NVIDIA
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
